
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Prasad's Orbit to 30</title>


<style>

body{
color:white;
font-family:Arial, Helvetica,sans-serif;
text-align:center;
overflow:hidden;
padding-top:40px;
transition:background 4s ease;
}

/* rotating sky */

#sky{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
animation:skyRotate 600s linear infinite;
}

@keyframes skyRotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* sky colors */

body.night{
background:radial-gradient(circle at 20% 30%, #0f172a, #020617);
}

body.sunset{
background:linear-gradient(#312e81,#7c3aed,#fb923c);
}

body.day{
background:linear-gradient(#60a5fa,#a5f3fc);
}

/* orbit */

.orbit{
width:320px;
height:320px;
border:1px dashed rgba(255,255,255,0.3);
border-radius:50%;
margin:40px auto;
position:relative;
z-index:2;
}

.sun{
width:45px;
height:45px;
background:gold;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 25px gold;
}

.planet{
width:18px;
height:18px;
background:#3b82f6;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform-origin:-160px 0;
box-shadow:0 0 12px #3b82f6;
animation:orbitMove 20s linear infinite;
cursor:pointer;
}

@keyframes orbitMove{
from{transform:rotate(0deg) translateX(160px);}
to{transform:rotate(360deg) translateX(160px);}
}

/* moon */

.moon{
position:absolute;
top:80px;
right:80px;
width:60px;
height:60px;
border-radius:50%;
background:#ddd;
box-shadow:0 0 20px rgba(255,255,255,0.4);
overflow:hidden;
z-index:2;
}

.moonShadow{
position:absolute;
top:0;
left:0;
width:60px;
height:60px;
border-radius:50%;
background:#020617;
}

/* stars */

.star{
position:absolute;
cursor:pointer;
animation:twinkle 4s infinite alternate;
}

.star.tiny{
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 4px white;
}

.star.medium{
width:6px;
height:6px;
background:white;
border-radius:50%;
box-shadow:0 0 8px white,0 0 14px rgba(255,255,255,0.7);
}

.star.bright{
width:8px;
height:8px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white,0 0 18px white,0 0 28px rgba(255,255,255,0.9);
}

@keyframes twinkle{
from{opacity:0.4}
to{opacity:1}
}

/* shooting stars */

.shootingStar{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 1s linear forwards;
}

@keyframes shoot{
from{transform:translate(0,0);opacity:1;}
to{transform:translate(300px,200px);opacity:0;}
}

/* BIGGER satellite */

.satellite{
position:absolute;
font-size:30px;
animation:satMove 14s linear forwards;
cursor:pointer;
}

@keyframes satMove{
from{transform:translateX(-100px);top:20vh;}
to{transform:translateX(120vw);top:35vh;}
}

.messageBox{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(15,23,42,0.95);
padding:15px 25px;
border-radius:12px;
font-size:16px;
display:none;
box-shadow:0 0 15px rgba(255,255,255,0.2);
z-index:3;
}

.days{
font-size:22px;
margin-top:10px;
letter-spacing:1px;
z-index:2;
position:relative;
}

.loveLine{
margin-top:25px;
font-size:18px;
font-style:italic;
color:#e2e8f0;
z-index:2;
position:relative;
}

.signature{
margin-top:25px;
font-size:13px;
color:rgba(255,255,255,0.65);
}

</style>

</head>

<body class="night">

<div id="sky"></div>

<h1>🪐 Prasad's Orbit to 30</h1>

<div class="moon">
<div class="moonShadow" id="moonShadow"></div>
</div>

<div class="orbit">
<div class="sun"></div>
<div class="planet" id="planet"></div>
</div>

<div class="days" id="days"></div>

<p class="loveLine">
Every day the planet moves closer to 30,<br>
and I move closer to loving you more.
</p>

<div class="messageBox" id="messageBox"></div>

<script>


/* sky change */

const hour=new Date().getHours()

if(hour>=6 && hour<17){document.body.className="day"}
else if(hour>=17 && hour<20){document.body.className="sunset"}
else{document.body.className="night"}

/* countdown */

const birthday=new Date("July 10 2027")
const now=new Date()

const daysLeft=Math.floor((birthday-now)/(1000*60*60*24))

document.getElementById("days").innerText=
daysLeft+" days until Prasad turns 30"

/* stars */

const sky=document.getElementById("sky")

let totalStars=200

const messages=[
"You are my favorite universe.",
"I still get butterflies when I see you.",
"You are my calm gravity.",
"You make ordinary days cosmic.",
"You are the orbit my heart chose.",
"I would choose you in every lifetime.",
"You are my favorite story.",
"My heart feels at home with you."
]

let clickCount=0

for(let i=0;i<totalStars;i++){

let star=document.createElement("div")

let r=Math.random()

if(r<0.6){star.className="star tiny"}
else if(r<0.9){star.className="star medium"}
else{star.className="star bright"}

star.style.top=Math.random()*100+"vh"
star.style.left=Math.random()*100+"vw"

star.onclick=function(){

clickCount++

const random=messages[Math.floor(Math.random()*messages.length)]

showMessage(random)

if(clickCount>=3){
showMessage("Somewhere between atoms, gravity and galaxies… I found you.")
clickCount=0
}

}

sky.appendChild(star)

}

/* message */

function showMessage(text){

const box=document.getElementById("messageBox")

box.innerText=text
box.style.display="block"

setTimeout(()=>{box.style.display="none"},4000)

}

/* planet message */

document.getElementById("planet").onclick=function(){
showMessage("You are the gravity that keeps my universe together.")
}

/* shooting stars */

function createShootingStar(){

let s=document.createElement("div")
s.className="shootingStar"

s.style.top=Math.random()*60+"vh"
s.style.left=Math.random()*60+"vw"

sky.appendChild(s)

setTimeout(()=>{s.remove()},1000)

}

setInterval(createShootingStar,20000)

/* satellite */

function createSatellite(){

let sat=document.createElement("div")
sat.className="satellite"
sat.innerHTML="🛰️"

sat.onclick=function(){
showMessage("🛰️ Mission Log: Prasad — center of Prathi’s universe.")
}

document.body.appendChild(sat)

setTimeout(()=>{sat.remove()},14000)

}

setInterval(createSatellite,40000)

/* moon phase */

function moonPhase(){

const lunarCycle=29.53
const knownNewMoon=new Date("2024-01-11")

const days=(now-knownNewMoon)/(1000*60*60*24)

const phase=(days%lunarCycle)/lunarCycle

const shadow=document.getElementById("moonShadow")

shadow.style.left=(phase*60)+"px"

}

moonPhase()

/* birthday meteor celebration */

const today=new Date()

if(
today.getDate()===10 &&
today.getMonth()===6 &&
today.getFullYear()===2027
){

setTimeout(startMeteorCelebration,2000)

}

function startMeteorCelebration(){

for(let i=0;i<40;i++){

setTimeout(()=>{

let meteor=document.createElement("div")

meteor.className="shootingStar"

meteor.style.top=Math.random()*80+"vh"
meteor.style.left=Math.random()*20+"vw"

sky.appendChild(meteor)

setTimeout(()=>meteor.remove(),1000)

},i*120)

}

setTimeout(showBirthdayMessage,4000)

}

function showBirthdayMessage(){

let message=document.createElement("div")

message.innerHTML="🎉 Happy 30th Prasad 🎉<br><br>The universe celebrates you today."

message.style.position="fixed"
message.style.top="50%"
message.style.left="50%"
message.style.transform="translate(-50%,-50%)"
message.style.fontSize="36px"
message.style.textAlign="center"
message.style.color="white"
message.style.textShadow="0 0 20px gold"
message.style.zIndex="10"

document.body.appendChild(message)

}

</script>

<div class="signature"
Created quietly by Prathi, who loves you more with every orbit.
</div>
  
</body>
</html>

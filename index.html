
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Prasad's Orbit to 30</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
padding-top:40px;
}

h1{
font-size:36px;
text-shadow:0 0 10px #60a5fa;
}

.orbit{
width:320px;
height:320px;
border:1px dashed rgba(255,255,255,0.3);
border-radius:50%;
margin:40px auto;
position:relative;
}

.sun{
width:45px;
height:45px;
background:gold;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 25px gold;
}

.planet{
width:18px;
height:18px;
background:#3b82f6;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform-origin:-160px 0;
box-shadow:0 0 12px #3b82f6;
animation:orbitMove 20s linear infinite;
}

@keyframes orbitMove{
from{transform:rotate(0deg) translateX(160px);}
to{transform:rotate(360deg) translateX(160px);}
}

.days{
font-size:26px;
margin-top:10px;
}

.loveLine{
margin-top:25px;
font-size:20px;
font-style:italic;
color:#e2e8f0;
text-shadow:0 0 6px rgba(255,255,255,0.3);
}

.star{
position:absolute;
background:white;
width:4px;
height:4px;
border-radius:50%;
cursor:pointer;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

.messageBox{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(15,23,42,0.95);
padding:15px 25px;
border-radius:12px;
font-size:18px;
display:none;
box-shadow:0 0 15px rgba(255,255,255,0.2);
}

</style>

</head>

<body>

<h1>🪐 Prasad's Orbit to 30</h1>

<div class="orbit">

<div class="sun"></div>

<div class="planet"></div>

</div>

<div class="days" id="days"></div>

<p class="loveLine">
Every day the planet moves closer to 30,<br>
and I move closer to loving you more.
</p>

<div class="messageBox" id="messageBox"></div>

<script>

// Dates
const startDate = new Date("March 15, 2026");
const targetDate = new Date("July 10, 2027");
const now = new Date();

// Countdown
const daysLeft = Math.floor((targetDate-now)/(1000*60*60*24));

document.getElementById("days").innerText =
daysLeft + " days until Prasad turns 30";

// Days passed since start
let daysPassed = Math.floor((now-startDate)/(1000*60*60*24));

if(daysPassed < 1){
daysPassed = 1;
}

// Love messages
const messages=[
"You are my favorite universe.",
"I still get butterflies when I see you.",
"You are my calm gravity.",
"I would choose you in every lifetime.",
"You are the orbit my heart chose.",
"You make ordinary days feel cosmic.",
"Somewhere between poetry and planets, I found you.",
"I am proud of the person you are becoming.",
"You are my favorite story.",
"My heart feels at home with you.",
"You make my universe make sense.",
"I love the way you exist in this world.",
"You are the gravity my heart obeys.",
"I didn’t just find love, I found you.",
"You are my quiet miracle."
];

// Create stars
for(let i=0;i<daysPassed;i++){

let star=document.createElement("div");

star.className="star";

star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

star.onclick=function(){

const random=messages[Math.floor(Math.random()*messages.length)];

const box=document.getElementById("messageBox");

box.innerText=random;

box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},4000);

};

document.body.appendChild(star);

}

</script>

</body>

</html>
